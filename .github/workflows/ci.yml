name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_USER: twist
          POSTGRES_PASSWORD: twist
          POSTGRES_DB: twist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TWIST_TEST_DATABASE_URL: postgres://twist:twist@localhost:5432/twist?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Prepare frontend embed directory
        run: mkdir -p frontend/dist

      - name: Run tests
        run: go test -v -count=1 ./...
