name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_USER: twist
          POSTGRES_PASSWORD: twist
          POSTGRES_DB: twist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TWIST_TEST_DATABASE_URL: postgres://twist:twist@localhost:5432/twist_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -v -count=1 ./...
