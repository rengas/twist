services:
  pg:
    image: postgres:16.2
    environment:
      PGUSER: twist
      POSTGRES_USER: twist
      POSTGRES_PASSWORD: twist
      POSTGRES_DB: twist
    ports:
      - 5435:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 3s
      timeout: 3s
      retries: 5
    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]